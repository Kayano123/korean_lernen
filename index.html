<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓語單字記憶助手 (第5-7課)</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5f7fa;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--secondary-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 { color: var(--primary-color); }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        select, button {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            cursor: pointer;
            font-size: 14px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }

        /* 字卡樣式 */
        .card-area {
            perspective: 1000px;
            margin-bottom: 30px;
        }

        .flashcard {
            width: 100%;
            height: 250px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 20px;
            box-sizing: border-box;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #e3f2fd;
        }

        .kr-text { font-size: 32px; font-weight: bold; margin-bottom: 10px; }
        .cn-text { font-size: 24px; color: #555; }
        .lesson-tag {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 12px;
            background: #eee;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .progress { margin-top: 10px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>🇰🇷 韓語單字卡</h1>
    
    <div class="controls">
        <select id="lessonFilter">
            <option value="all">所有課程 (5-7)</option>
            <option value="5">第 5 課：問路</option>
            <option value="6">第 6 課：問候與近況</option>
            <option value="7">第 7 課：外貌與服裝</option>
        </select>
        <button onclick="shuffleCards()">隨機打亂</button>
    </div>

    <div class="card-area">
        <div class="flashcard" id="card" onclick="this.classList.toggle('is-flipped')">
            <div class="card-face card-front">
                <span class="lesson-tag" id="tagFront">Lesson</span>
                <div class="kr-text" id="krDisplay">加載中...</div>
                <div style="color: #999; font-size: 12px;">(點擊翻面)</div>
            </div>
            <div class="card-face card-back">
                <span class="lesson-tag" id="tagBack">Lesson</span>
                <div class="cn-text" id="cnDisplay">加載中...</div>
            </div>
        </div>
    </div>

    <div class="nav-buttons">
        <button onclick="prevCard()" style="background:#666">上一個</button>
        <div class="progress" id="progressText">0 / 0</div>
        <button onclick="nextCard()">下一個</button>
    </div>
</div>

    // B. 課文與活動新字彙 (새 어휘)

    { kr: "짝", cn: "對、雙、搭檔", lesson: 7 },
    { kr: "말을 걸다", cn: "搭話、攀談", lesson: 7 },
    { kr: "으악", cn: "啊！", lesson: 7 },

    { kr: "단춧구멍", cn: "扣眼", lesson: 7 },

    { kr: "구두", cn: "皮鞋", lesson: 7 },
    { kr: "부츠", cn: "靴子", lesson: 7 },
    { kr: "가방을 메다", cn: "背背包", lesson: 7 },
    { kr: "가방을 들다", cn: "提包包", lesson: 7 },
    { kr: "회색", cn: "灰色", lesson: 7 },
    { kr: "분홍색", cn: "粉紅色", lesson: 7 },
    { kr: "노란색", cn: "黃色", lesson: 7 },
    { kr: "파란색", cn: "藍色", lesson: 7 },
    { kr: "빨간색", cn: "紅色", lesson: 7 },
    { kr: "까만색", cn: "黑色", lesson: 7 },
    { kr: "흰색", cn: "白色", lesson: 7 },
    { kr: "갈색", cn: "棕色", lesson: 7 },
    { kr: "초록색", cn: "綠色", lesson: 7 },
    { kr: "평소", cn: "平常", lesson: 7 },

    { kr: "살이 찌다", cn: "長胖、發福", lesson: 7 },
    { kr: "보호하다", cn: "保護", lesson: 7 },
    { kr: "미아보호소", cn: "走失幼童保護中心", lesson: 7 },
    { kr: "액세서리", cn: "飾品", lesson: 7 },

    { kr: "목걸이", cn: "項鍊", lesson: 7 },
    { kr: "알아듣다", cn: "聽懂", lesson: 7 },
    { kr: "후사하다", cn: "厚謝、重謝", lesson: 7 },
    { kr: "천사", cn: "天使", lesson: 7 },
    { kr: "호랑이", cn: "老虎", lesson: 7 },
    { kr: "연예인", cn: "演藝人員", lesson: 7 },
    { kr: "아이돌", cn: "偶像", lesson: 7 },
    { kr: "졸다", cn: "打瞌睡", lesson: 7 },
    { kr: "늘다", cn: "增加", lesson: 7 },
    { kr: "줄다", cn: "減少", lesson: 7 },
    { kr: "줄이다", cn: "使減少", lesson: 7 },
    { kr: "가늘다", cn: "細的", lesson: 7 }
    ];

    let currentList = [...vocabData];
    let currentIndex = 0;

    const krDisplay = document.getElementById('krDisplay');
    const cnDisplay = document.getElementById('cnDisplay');
    const tagFront = document.getElementById('tagFront');
    const tagBack = document.getElementById('tagBack');
    const progressText = document.getElementById('progressText');
    const lessonFilter = document.getElementById('lessonFilter');
    const cardElement = document.getElementById('card');

    function updateCard() {
        if (currentList.length === 0) {
            krDisplay.innerText = "沒有單字";
            cnDisplay.innerText = "請更換篩選條件";
            return;
        }
        cardElement.classList.remove('is-flipped');
        setTimeout(() => {
            const item = currentList[currentIndex];
            krDisplay.innerText = item.kr;
            cnDisplay.innerText = item.cn;
            tagFront.innerText = `L${item.lesson}`;
            tagBack.innerText = `L${item.lesson}`;
            progressText.innerText = `${currentIndex + 1} / ${currentList.length}`;
        }, 150);
    }

    function nextCard() {
        if (currentIndex < currentList.length - 1) {
            currentIndex++;
            updateCard();
        }
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            updateCard();
        }
    }

    function shuffleCards() {
        currentList.sort(() => Math.random() - 0.5);
        currentIndex = 0;
        updateCard();
    }

    lessonFilter.addEventListener('change', (e) => {
        const val = e.target.value;
        if (val === 'all') {
            currentList = [...vocabData];
        } else {
            currentList = vocabData.filter(item => item.lesson == val);
        }
        currentIndex = 0;
        updateCard();
    });

    // 初始化
    updateCard();
</script>

</body>
</html>
